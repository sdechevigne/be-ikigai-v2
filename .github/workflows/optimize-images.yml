name: Optimize images

on:
  push:
    paths:
      - 'public/assets/img/blog/**'

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install sharp
        run: npm install sharp

      - name: Convert new images to WebP
        run: |
          node << 'EOF'
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');

          const inputDir = 'public/assets/img/blog';
          // Traite uniquement les couvertures blog (*.jpg|*.jpeg|*.png)
          // Exclut les images -og (Open Graph) et les WebP déjà générés
          const blogCoverPattern = /^.+\.(jpg|jpeg|png)$/i;
          const files = fs.readdirSync(inputDir).filter(f =>
            blogCoverPattern.test(f) && !f.includes('-og.')
          );

          async function convert(file) {
            const base = path.basename(file, path.extname(file));
            const input = path.join(inputDir, file);
            const out = path.join(inputDir, `${base}.webp`);
            if (!fs.existsSync(out)) {
              await sharp(input).webp({ quality: 82 }).toFile(out);
              console.log(`Created: ${out}`);
            }
          }

          (async () => {
            for (const f of files) await convert(f);
          })();
          EOF

      - name: Commit WebP files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/img/blog/*.webp
          git diff --staged --quiet || git commit -m "perf: auto-generate WebP versions [skip ci]"
          git push
