name: Blog — Sync Kanban → Site

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.email "pipeline@be-ikigai.fr"
          git config user.name "Be-Ikigai Pipeline"

      - name: Sync kanban statuts → site
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: |
          node --input-type=module << 'EOF'
          import { spawnSync } from 'child_process';
          import { readFileSync, writeFileSync, existsSync } from 'fs';

          const PROJECT_ID = process.env.PROJECT_ID;

          function gh(query) {
            const r = spawnSync('gh', ['api', 'graphql', '--input', '-'], {
              input: JSON.stringify({ query }), encoding: 'utf8', timeout: 30000,
            });
            if (r.status !== 0) throw new Error(r.stderr || r.stdout);
            return JSON.parse(r.stdout);
          }

          function ghArgs(args) {
            const r = spawnSync('gh', args, { encoding: 'utf8', timeout: 30000 });
            if (r.status !== 0) throw new Error(r.stderr || r.stdout);
            return r.stdout.trim();
          }

          // Récupérer toutes les cards du projet avec Status et Article Path
          const res = gh(`{
            node(id: "${PROJECT_ID}") {
              ... on ProjectV2 {
                items(first: 100) {
                  nodes {
                    id
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name field { ... on ProjectV2SingleSelectField { name } }
                        }
                        ... on ProjectV2ItemFieldTextValue {
                          text field { ... on ProjectV2Field { name } }
                        }
                      }
                    }
                  }
                }
              }
            }
          }`);

          const items = res?.data?.node?.items?.nodes || [];
          let changed = false;

          for (const item of items) {
            const fvs = item.fieldValues?.nodes || [];
            const status = fvs.find(f => f.field?.name === 'Status')?.name || '';
            const articlePath = fvs.find(f => f.field?.name === 'Article Path')?.text || '';

            if (!['Trash', 'Published', 'Archivé'].includes(status)) continue;
            if (!articlePath) {
              if (status === 'Trash') {
                // Card Trash sans article path : supprimer la card uniquement
                console.log(`Trash sans article path — suppression card ${item.id}`);
                gh(`mutation { deleteProjectV2Item(input: { projectId: "${PROJECT_ID}" itemId: "${item.id}" }) { deletedItemId } }`);
              }
              continue;
            }

            const paths = articlePath.split('|').map(p => p.trim()).filter(Boolean);

            if (status === 'Trash') {
              console.log(`TRASH: ${articlePath}`);
              for (const p of paths) {
                if (existsSync(p)) {
                  spawnSync('git', ['rm', p], { encoding: 'utf8' });
                  console.log(`  Supprimé : ${p}`);
                  changed = true;
                } else {
                  console.log(`  Introuvable (ignoré) : ${p}`);
                }
              }
              // Supprimer la card
              gh(`mutation { deleteProjectV2Item(input: { projectId: "${PROJECT_ID}" itemId: "${item.id}" }) { deletedItemId } }`);
              console.log(`  Card supprimée.`);

            } else if (status === 'Published') {
              console.log(`PUBLISH: ${articlePath}`);
              for (const p of paths) {
                if (existsSync(p)) {
                  let content = readFileSync(p, 'utf8');
                  const updated = content.replace(/^status:\s*["']?draft["']?/m, 'status: published');
                  if (updated !== content) {
                    writeFileSync(p, updated);
                    spawnSync('git', ['add', p], { encoding: 'utf8' });
                    console.log(`  Publié : ${p}`);
                    changed = true;
                  } else {
                    console.log(`  Déjà publié : ${p}`);
                  }
                } else {
                  console.log(`  Introuvable (ignoré) : ${p}`);
                }
              }

            } else if (status === 'Archivé') {
              console.log(`ARCHIVE: ${articlePath}`);
              for (const p of paths) {
                if (existsSync(p)) {
                  let content = readFileSync(p, 'utf8');
                  const updated = content.replace(/^status:\s*["']?published["']?/m, 'status: draft');
                  if (updated !== content) {
                    writeFileSync(p, updated);
                    spawnSync('git', ['add', p], { encoding: 'utf8' });
                    console.log(`  Dépublié : ${p}`);
                    changed = true;
                  } else {
                    console.log(`  Déjà en draft : ${p}`);
                  }
                } else {
                  console.log(`  Introuvable (ignoré) : ${p}`);
                }
              }
            }
          }

          if (!changed) {
            console.log('Aucun changement à appliquer.');
          }
          EOF

      - name: Mettre à jour llms.txt et llms-full.txt
        run: |
          node pipeline/scripts/update-seo-files.js
          git add public/llms.txt public/llms-full.txt

      - name: Commit et push si changements
        run: |
          if ! git diff --cached --quiet; then
            git commit -m "blog: sync kanban → site"
            git push origin master
          fi
