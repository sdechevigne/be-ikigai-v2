name: Blog — Publier un article

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug de l'article (ex: 2026-04-28-ikigai-reconversion-fr)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.email "pipeline@be-ikigai.fr"
          git config user.name "Be-Ikigai Pipeline"

      - name: Publish FR article
        run: |
          FILE="src/content/blog/${{ inputs.slug }}.md"
          if [[ ! -f "$FILE" ]]; then
            echo "Fichier introuvable : $FILE"
            exit 1
          fi
          python3 - "$FILE" <<'PYEOF'
          import sys, re
          path = sys.argv[1]
          content = open(path).read()
          m = re.search(r'^description:\s*"(.+?)"', content, re.MULTILINE)
          if m:
              l = len(m.group(1))
              if l < 110 or l > 160:
                  print(f"ERREUR: description {l} chars (attendu 110-160)")
                  sys.exit(1)
          print("Frontmatter OK")
          PYEOF
          sed -i 's/^status: draft/status: published/' "$FILE"
          git add "$FILE"
          git commit -m "blog: publish '${{ inputs.slug }}'"

      - name: Publish EN article (si existant)
        run: |
          EN_SLUG="${{ inputs.slug }}"
          EN_SLUG="${EN_SLUG%-fr}-en"
          FILE="src/content/blog/${EN_SLUG}.md"
          if [[ -f "$FILE" ]]; then
            sed -i 's/^status: draft/status: published/' "$FILE"
            git add "$FILE"
            git commit -m "blog: publish '${EN_SLUG}'"
          else
            echo "Pas de version EN trouvée (${FILE}) — ignoré"
          fi

      - name: Push
        run: git push origin master

      - name: Mettre à jour Publication Date dans GitHub Projects
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          PROJECT_FIELD_PUBLICATION_DATE_ID: ${{ secrets.PROJECT_FIELD_PUBLICATION_DATE_ID }}
          SLUG: ${{ inputs.slug }}
        run: |
          DATE_TODAY=$(date -u +%Y-%m-%d)
          export DATE_TODAY
          node --input-type=module << 'EOF'
          import { spawnSync } from 'child_process';

          const projectId = process.env.PROJECT_ID;
          const fieldId = process.env.PROJECT_FIELD_PUBLICATION_DATE_ID;
          const slug = process.env.SLUG || '';
          const date = process.env.DATE_TODAY;

          if (!projectId || !fieldId) { console.log('Secrets manquants — skip'); process.exit(0); }

          function gh(query) {
            const r = spawnSync('gh', ['api', 'graphql', '--input', '-'], {
              input: JSON.stringify({ query }), encoding: 'utf8', timeout: 30000,
            });
            if (r.status !== 0) throw new Error(r.stderr || r.stdout);
            return JSON.parse(r.stdout);
          }

          const items = gh(`{ node(id: "${projectId}") { ... on ProjectV2 { items(first: 100) { nodes {
            id
            fieldValues(first: 20) { nodes {
              ... on ProjectV2ItemFieldTextValue { text field { ... on ProjectV2Field { name } } }
            }}
          }}}}}`);

          const node = items?.data?.node?.items?.nodes?.find(n =>
            n.fieldValues?.nodes?.some(fv => fv.field?.name === 'Article Path' && fv.text?.includes(slug))
          );

          if (!node) { console.log('Card non trouvée pour slug:', slug); process.exit(0); }

          gh(`mutation { updateProjectV2ItemFieldValue(input: {
            projectId: "${projectId}" itemId: "${node.id}"
            fieldId: "${fieldId}"
            value: { date: "${date}" }
          }) { projectV2Item { id } } }`);

          console.log('Publication Date mise à jour :', date, 'pour', slug);
          EOF
